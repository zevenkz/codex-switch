name: Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Package macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build macOS package
        run: >
          pnpm tauri build
          --target universal-apple-darwin
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Collect macOS artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p package-assets
          APP_PATH=""
          DMG_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
              [ -z "$DMG_PATH" ] && DMG_PATH=$(find "$path" -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
            fi
          done
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" package-assets/codex-switch-macos.app.zip
          fi
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" package-assets/
          fi
          ls -la package-assets

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-macos
          path: package-assets/*
          if-no-files-found: error
